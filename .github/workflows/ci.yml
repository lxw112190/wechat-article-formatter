name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
      - run: npm ci
      - run: npm run check

      - name: Package downloadable build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd dist
          zip -r ../wechat-article-formatter-main-${GITHUB_SHA::7}.zip .
          cd ..
          sha256sum wechat-article-formatter-main-${GITHUB_SHA::7}.zip > SHA256SUMS

      - name: Upload downloadable build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: wechat-article-formatter-main-${{ github.run_number }}
          path: |
            wechat-article-formatter-main-*.zip
            SHA256SUMS
          if-no-files-found: error
          retention-days: 30
