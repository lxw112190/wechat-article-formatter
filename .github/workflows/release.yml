name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Package static build
        run: |
          cd dist
          zip -r ../wechat-article-formatter-${GITHUB_REF_NAME}.zip .
          cd ..
          sha256sum wechat-article-formatter-${GITHUB_REF_NAME}.zip > SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "wechat-article-formatter-${GITHUB_REF_NAME}.zip" SHA256SUMS --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
